# =============================================================================
# brands/baskin-robbins.properties — Baskin-Robbins-specific configuration
# =============================================================================
# Values override matching keys in config.properties when active.brand=baskin-robbins.
# =============================================================================

# ── Page URL ──────────────────────────────────────────────────────────────────
brand.page.url=/baskin-robbins

# ── Expected text / assertions ────────────────────────────────────────────────
brand.display.name=Baskin-Robbins
brand.hero.heading=Franchise with Baskin-Robbins
brand.why.heading=Why Baskin-Robbins?
brand.section.anything.possible=Anything is possible with Baskin-Robbins

# Qualification requirements
brand.liquid.assets=100,000
brand.net.worth=200,000

# Restaurant formats present on the page
brand.formats=Free Standing,Endcap,Inline,Small Format

# Awards
brand.award.entrepreneur=Entrepreneur Best of the Best
brand.award.franchise500=Franchise 500
brand.award.topfood=Top Food Franchises

# GET STARTED link must include this brand query parameter
brand.get.started.param=Baskin

# Factoid — 7,800 shops in 36 global markets
brand.restaurant.count=7,800
