# =============================================================================
# brands/arbys.properties — Arby's-specific configuration
# =============================================================================
# Values in this file override the matching keys in config.properties when
# active.brand=arbys.
# =============================================================================

# ── Page URL ──────────────────────────────────────────────────────────────────
brand.page.url=/arbys

# ── Expected text / assertions ────────────────────────────────────────────────
brand.display.name=Arby's
brand.hero.heading=Franchise with Arby's
brand.why.heading=Why Arby's?
brand.section.anything.possible=Anything is possible with Arby's

# Qualification requirements
brand.liquid.assets=500,000
brand.net.worth=1,000,000

# Restaurant formats present on the page
brand.formats=Free Standing,Endcap,Small Format

# Awards
brand.award.entrepreneur=Entrepreneur Best of the Best
brand.award.franchise500=Franchise 500
brand.award.topfood=Top Food Franchises

# GET STARTED link must include this brand query parameter
brand.get.started.param=Arby

# Factoid
brand.restaurant.count=3,500
