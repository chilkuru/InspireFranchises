# =============================================================================
# config.properties — Global framework configuration
# =============================================================================
# All values here can be overridden by:
#   • Brand-specific properties (brands/<brand>.properties)
#   • JVM system properties (-Dkey=value)
#   • Maven profile properties
# =============================================================================

# ── Browser ───────────────────────────────────────────────────────────────────
# Supported: chrome | firefox | edge
browser=chrome

# Run tests without opening a visible browser window
headless=false

# ── Application ───────────────────────────────────────────────────────────────
base.url=https://www.franchising.inspirebrands.com

# ── Active Brand ──────────────────────────────────────────────────────────────
# Used when running tests directly (not via Maven profiles).
# Supported keys: arbys | baskin-robbins | buffalo-wild-wings | bww-go | dunkin | jimmy-johns | sonic | all
active.brand=all

# ── Timeouts (seconds) ────────────────────────────────────────────────────────
explicit.wait.sec=15
page.load.timeout.sec=30

# ── Report output ─────────────────────────────────────────────────────────────
report.output.dir=test-output/extent-reports
screenshot.dir=test-output/screenshots
